<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WarEra API Docs (Community)</title>
  <meta name="description" content="Community-made endpoint documentation for the WarEra tRPC API. Not affiliated with WarEra developers." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" />
  <style>
    .disclaimer-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 4px;
      padding: 10px 16px;
      margin: 0 0 1.5em 0;
      font-size: 0.9em;
      color: #856404;
    }

    /* Support block */
    .support-block {
      margin-top: 2em;
    }
    .support-desc {
      font-size: 0.92em;
      opacity: 0.75;
      margin-bottom: 1em;
    }
    .support-table {
      border: 1px solid var(--borderColor, #2a2a2a);
      border-radius: 4px;
      overflow: hidden;
    }
    .support-row {
      display: flex;
      align-items: center;
      gap: 1.2em;
      padding: 0.75em 1em;
      border-bottom: 1px solid var(--borderColor, #2a2a2a);
    }
    .support-row:last-child {
      border-bottom: none;
    }
    .support-label {
      font-size: 0.72em;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #c47a00;
      min-width: 90px;
      line-height: 1.3;
    }
    .support-sublabel {
      color: #888;
      font-weight: 400;
    }
    .support-value {
      font-size: 0.82em;
      flex: 1;
      word-break: break-all;
      opacity: 0.9;
    }
    .support-link {
      color: #c47a00;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      transition: opacity 0.15s;
    }
    .support-link:hover {
      opacity: 0.75;
      text-decoration: none;
    }
    .support-ext-icon {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
    }
    .support-copy {
      font-size: 0.7em;
      letter-spacing: 0.1em;
      padding: 0.3em 0.7em;
      border: 1px solid var(--borderColor, #444);
      border-radius: 2px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .support-copy:hover {
      opacity: 1;
      border-color: #c47a00;
      color: #c47a00;
    }
    .support-copy.copied {
      color: #42b983;
      border-color: #42b983;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'WarEra API Docs',
      repo: 'https://github.com/majimawrks/warera-api-docs',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: 'Search endpoints...',
        noData: 'No results found.',
        depth: 3
      },
      darklightTheme: {
        defaultTheme: 'dark',
        siteFont: 'Source Sans Pro',
        codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
        bodyFontSize: '15px',
        dark: {
          accent: '#42b983',
          toogleBackground: '#ffffff',
          background: '#1a1a1a',
          textColor: '#b4b4b4',
          codeTextColor: '#ffffff',
          codeBackgroundColor: '#0e0e0e',
          borderColor: '#0d2538',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          sidebarSublink: '#b4b4b4',
          codeTypeColor: '#ffffff',
          coverBackground: 'linear-gradient(to left bottom, hsl(118, 100%, 85%), hsl(181, 100%, 85%))',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
        },
        light: {
          accent: '#42b983',
          toogleBackground: '#091a28',
          background: '#ffffff',
          textColor: '#34495e',
          codeTextColor: '#525252',
          codeBackgroundColor: '#f8f8f8',
          borderColor: 'rgba(0, 0, 0, 0.07)',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          sidebarSublink: '#505d6b',
          codeTypeColor: '#091a28',
          coverBackground: 'linear-gradient(to left bottom, hsl(118, 100%, 85%), hsl(181, 100%, 85%))',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
        }
      },
      plugins: [
        function (hook) {
          hook.beforeEach(function (content) {
            return content;
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
  <script>
    function supportCopy(btn) {
      var addr = btn.getAttribute('data-addr');
      navigator.clipboard.writeText(addr).then(function () {
        var orig = btn.textContent;
        btn.textContent = 'COPIED';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = orig;
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
